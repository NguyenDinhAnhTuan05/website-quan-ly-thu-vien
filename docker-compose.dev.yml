# ============================================================
# Docker Compose Development - Library Management System
# For local development with hot reload and debugging
# ============================================================

services:
  # ============================================================
  # MySQL Database Service (Development)
  # ============================================================
  mysql:
    image: mysql:8
    container_name: library-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: library_db
      MYSQL_USER: library_user
      MYSQL_PASSWORD: library_pass
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3306:3306"
    volumes:
      - mysql-data-dev:/var/lib/mysql
      - ./src/main/resources/db/migration:/docker-entrypoint-initdb.d:ro
    networks:
      - library-network-dev
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "library_user",
          "-plibrary_pass",
        ]
      timeout: 20s
      retries: 10
      interval: 10s

  # ============================================================
  # Redis Cache Service (Development)
  # ============================================================
  redis:
    image: redis:7
    container_name: library-redis-dev
    command: redis-server --appendonly yes --requirepass redis_secure_pass
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
    networks:
      - library-network-dev
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      timeout: 10s
      retries: 5
      interval: 10s

networks:
  library-network-dev:
    driver: bridge

volumes:
  mysql-data-dev:
    driver: local
  redis-data-dev:
    driver: local
