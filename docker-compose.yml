# ============================================================
# Docker Compose - Library Management System
# Services: App, MySQL, Redis
# ============================================================

services:
  # ============================================================
  # MySQL Database Service
  # ============================================================
  mysql:
    image: mysql:8
    container_name: library-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-library_db}
      MYSQL_USER: ${MYSQL_USER:-library_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-library_pass}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      # Persist MySQL data
      - mysql-data:/var/lib/mysql
      # Mount initialization scripts
      - ./src/main/resources/db/migration:/docker-entrypoint-initdb.d:ro
    networks:
      - library-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "${MYSQL_USER:-library_user}",
          "-p${MYSQL_PASSWORD:-library_pass}",
        ]
      timeout: 20s
      retries: 10
      interval: 10s
    restart: unless-stopped

  # ============================================================
  # Redis Cache Service
  # ============================================================
  redis:
    image: redis:7
    container_name: library-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_pass}
    volumes:
      # Persist Redis data
      - redis-data:/data
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_pass}", "--no-auth-warning", "--raw", "incr", "ping"]
      timeout: 10s
      retries: 5
      interval: 10s
    restart: unless-stopped

  # ============================================================
  # Spring Boot Application
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    container_name: library-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Spring Boot Configuration
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-library_db}?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-library_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-library_pass}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver

      # JPA/Hibernate
      SPRING_JPA_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"

      # Redis Configuration
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_pass}
      SPRING_DATA_REDIS_TIMEOUT: 60000ms

      # Application Profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-production}

      # Server Configuration
      SERVER_PORT: "8080"
      SERVER_SERVLET_CONTEXT_PATH: /

      # JWT — BẮT BUỘC, không có default, app sẽ crash nếu thiếu
      JWT_SECRET: ${JWT_SECRET}

      # CORS — danh sách origin được phép gọi API
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}

      # Email
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}

      # OAuth2 — Google & GitHub (để "dummy" nếu không dùng)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dummy}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-dummy}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-dummy}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-dummy}

      # Gemini AI
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

      # VNPay — return URL phải trỏ về đúng địa chỉ server
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-http://localhost:8080/api/payment/vnpay-return}

      # MoMo — return/notify URL phải trỏ về đúng địa chỉ server
      MOMO_RETURN_URL: ${MOMO_RETURN_URL:-http://localhost:8080/api/payment/momo-return}
      MOMO_NOTIFY_URL: ${MOMO_NOTIFY_URL:-http://localhost:8080/api/payment/momo-notify}

      # Logging
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_COM_NHOM10: INFO

      # JVM Options
      JAVA_OPTS: -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Djava.awt.headless=true
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - library-network
    volumes:
      - app-logs:/app/logs
      # Lưu file upload (avatar, ...) — persist qua container restart
      - uploads-data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      timeout: 10s
      retries: 5
      interval: 30s
      start_period: 120s
    restart: unless-stopped

# ============================================================
# Networks
# ============================================================
networks:
  library-network:
    driver: bridge

# ============================================================
# Volumes
# ============================================================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  app-logs:
    driver: local
  uploads-data:
    driver: local
