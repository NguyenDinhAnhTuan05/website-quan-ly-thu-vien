# ============================================================
# SPRING APPLICATION CONFIG
# ============================================================
spring.application.name=library-management

# ============================================================
# DATABASE - MySQL XAMPP
# HOST: localhost
# PORT: 3306
# USERNAME: root
# PASSWORD: (empty)
# DATABASE: library_db
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/library_db?useSSL=${DB_USE_SSL:false}&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=${DB_ALLOW_PUBLIC_KEY:true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# JPA / HIBERNATE
# ddl-auto: validate - Flyway handles schema, Hibernate validates
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=20
spring.jpa.open-in-view=false

# ============================================================
# FLYWAY - Database Migration
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ============================================================
# REDIS CACHE
# ============================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=60000ms
spring.data.redis.password=${REDIS_PASSWORD:}

# ============================================================
# LOGGING
# ============================================================
logging.level.root=INFO
logging.level.com.nhom10.library=DEBUG

# ============================================================
# FILE UPLOAD
# ============================================================
file.upload-dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
